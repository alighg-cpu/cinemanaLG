name: Build LG webOS App (IPK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # زر يدوي لتشغيله

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'   # أو 20، حسب إصدار CLI اللي تستخدمه

    - name: Install webOS CLI
      run: |
        npm install -g @webos-tools/cli
        ares --version   # للتأكد من التثبيت

    - name: Package the app (create .ipk)
      run: ares-package .

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: cinemana-lg-ipk
        path: ./*.ipk
        retention-days: 7

    - name: Show built files
      run: ls -la
